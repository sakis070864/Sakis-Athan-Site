<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <text x="256" y="270" text-anchor="middle" dominant-baseline="central" 
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" 
        font-weight="800" font-size="400" fill="white" 
        filter="url(#shadow)" letter-spacing="-10">A</text>
</svg>
